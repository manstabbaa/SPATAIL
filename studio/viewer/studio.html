<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPATAIL Studio — tester room</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --bg: #0e1116; --panel: #161b22; --line: #243040;
        --text: #e6edf3; --dim: #8b98a8; --accent: #4f8cff; --good: #3fb950;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif; }
      #app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 48px 1fr;
        height: 100vh; }
      header { grid-column: 1 / 3; display: flex; align-items: center; gap: 12px;
        padding: 0 16px; border-bottom: 1px solid var(--line); background: var(--panel); }
      header .mark { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); }
      header .name { font-weight: 600; letter-spacing: .3px; }
      header .sub { color: var(--dim); font-size: 13px; }
      #ask-form { margin-left: auto; display: flex; gap: 8px; align-items: center; }
      #ask-input { width: 420px; max-width: 38vw; background: #0d1117; color: var(--text);
        border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 13px; }
      #ask-input:focus { outline: none; border-color: var(--accent); }
      #ask-btn { background: #1f3a6e; color: var(--text); border: 1px solid var(--accent);
        border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
      #ask-btn:disabled { opacity: .5; cursor: default; }
      #stage { position: relative; }
      #canvas-wrap { position: absolute; inset: 0; }
      #labels { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
      .beat-label { position: relative; transform: translate(-50%, -100%);
        background: rgba(22,27,34,.82); border: 1px solid var(--line); border-radius: 10px;
        padding: 6px 10px; min-width: 120px; text-align: center; backdrop-filter: blur(6px);
        transition: opacity .3s, border-color .3s; }
      .beat-label .law { color: var(--accent); font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .6px; }
      .beat-label .sub { font-size: 13px; font-weight: 600; }
      .beat-label.dim { opacity: .35; }
      .beat-label.active { border-color: var(--accent); }
      #hud { position: absolute; left: 12px; bottom: 12px; font-size: 12px; color: var(--dim);
        background: rgba(14,17,22,.6); padding: 4px 8px; border-radius: 6px; }
      aside { border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto;
        padding: 14px; display: flex; flex-direction: column; gap: 16px; }
      .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .6px;
        color: var(--dim); margin: 0 0 8px; }
      .btns { display: flex; flex-wrap: wrap; gap: 8px; }
      button { background: #1d2531; color: var(--text); border: 1px solid var(--line);
        border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
      button:hover { border-color: var(--accent); }
      button.on { background: #1f3a6e; border-color: var(--accent); }
      #narration { font-size: 14px; line-height: 1.5; }
      #narration .law { color: var(--accent); font-weight: 700; font-size: 12px;
        text-transform: uppercase; letter-spacing: .5px; }
      #narration .title { font-weight: 600; margin: 2px 0 6px; }
      .why { font-size: 12px; color: var(--dim); line-height: 1.5;
        border-left: 2px solid var(--line); padding-left: 10px; }
      dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 10px; margin: 0; font-size: 12px; }
      dt { color: var(--dim); } dd { margin: 0; }
      #status { color: var(--dim); font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <span class="mark"></span>
        <span class="name">SPATAIL Educator</span>
        <span class="sub" id="scene-title">loading…</span>
        <form id="ask-form" autocomplete="off">
          <input id="ask-input" type="text"
            placeholder="Ask anything — e.g. How do Newton's laws work?" />
          <button id="ask-btn" type="submit">Build it</button>
        </form>
      </header>
      <section id="stage">
        <div id="canvas-wrap"></div>
        <div id="labels"></div>
        <div id="hud"></div>
      </section>
      <aside>
        <div class="panel">
          <h2>Controls</h2>
          <div class="btns" id="controls"></div>
        </div>
        <div class="panel">
          <h2>Now showing</h2>
          <div id="narration">—</div>
        </div>
        <div class="panel">
          <h2>Why this layout</h2>
          <div class="why" id="why">—</div>
        </div>
        <div class="panel">
          <h2>Spatial layout</h2>
          <dl id="facts"></dl>
        </div>
        <div class="panel">
          <h2>Status</h2>
          <div id="status">booting…</div>
        </div>
      </aside>
    </div>
    <script type="module" src="/studio/viewer/studio_viewer.js"></script>
  </body>
</html>
